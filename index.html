<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>말랑말랑 모험 보드게임 (프리미엄 에디션)</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           1. 프리미엄 클레이모피즘 색상 & 변수
           ========================================= */
        :root {
            --bg-ocean: #f0fdf4; /* 부드러운 민트/그린톤 배경 */
            --clay-island: #fef08a; /* 폭신한 징검다리 */
            --clay-island-dark: #eab308;
            --clay-island-light: #fef9c3;
            
            --clay-btn: #38bdf8;
            --clay-btn-dark: #0284c7;
            --clay-btn-light: #7dd3fc;
            
            --clay-p1: #f43f5e;
            --clay-p2: #3b82f6;

            --clay-modal: #ffffff;
            --text-color: #334155;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #e0f2fe 0%, #dcfce7 100%);
            font-family: 'Jua', sans-serif;
            color: var(--text-color);
            touch-action: manipulation;
            overflow: hidden; 
        }

        /* 텍스트 입력창 제외하고 드래그 방지 */
        body { user-select: none; -webkit-user-select: none; }
        input { user-select: auto; -webkit-user-select: auto; }

        .no-scrollbar { overflow-y: auto; scrollbar-width: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* =========================================
           2. 향상된 찰흙 질감 (입체감 극대화)
           ========================================= */
        .clay-box {
            border-radius: 25px;
            background: var(--clay-btn);
            box-shadow: 
                8px 8px 16px rgba(0, 0, 0, 0.15),
                -8px -8px 16px rgba(255, 255, 255, 0.8),
                inset 4px 4px 10px rgba(255, 255, 255, 0.5),
                inset -4px -4px 10px rgba(0, 0, 0, 0.1);
            color: white;
            transition: all 0.2s ease;
            text-align: center;
            border: none;
            outline: none;
        }

        .clay-btn-action { cursor: pointer; }
        .clay-btn-action:hover { filter: brightness(1.05); }
        .clay-btn-action:active {
            transform: scale(0.93);
            box-shadow: 
                4px 4px 8px rgba(0, 0, 0, 0.1),
                -4px -4px 8px rgba(255, 255, 255, 0.9),
                inset 6px 6px 15px rgba(0, 0, 0, 0.15),
                inset -6px -6px 15px rgba(255, 255, 255, 0.6);
        }

        /* =========================================
           3. UI 레이아웃 및 시작 화면
           ========================================= */
        #app {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 20px; box-sizing: border-box; position: relative;
        }

        #admin-btn {
            position: absolute; top: 20px; right: 20px;
            font-size: 2.5rem; cursor: pointer; opacity: 0.5; transition: all 0.3s;
            background: white; border-radius: 50%; padding: 10px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
        #admin-btn:hover { opacity: 1; transform: rotate(45deg); }

        h1 { font-size: 3rem; text-shadow: 3px 3px 6px rgba(0,0,0,0.15); margin-bottom: 30px; color: #0369a1; text-align: center; }

        #setup-screen {
            background: rgba(255, 255, 255, 0.65); padding: 40px; border-radius: 40px;
            width: 90%; max-width: 600px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(15px); display: flex; flex-direction: column; gap: 20px;
        }

        .setting-row { display: flex; gap: 15px; justify-content: space-between; flex-wrap: wrap;}
        .setting-group { flex: 1; display: flex; flex-direction: column; gap: 8px; font-size: 1.2rem; min-width: 150px;}
        
        select {
            font-family: 'Jua', sans-serif; font-size: 1.2rem; padding: 12px; border-radius: 20px;
            border: 2px solid transparent; outline: none; background: white; box-shadow: inset 3px 3px 6px rgba(0,0,0,0.05);
            color: #334155; transition: all 0.3s; cursor: pointer;
        }
        select:focus { border-color: #38bdf8; }

        /* 캐릭터 선택 UI */
        .char-select-container { display: flex; gap: 10px; justify-content: space-around; background: white; padding: 10px; border-radius: 20px; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);}
        .char-option { font-size: 2rem; padding: 5px; cursor: pointer; border-radius: 15px; transition: all 0.2s; border: 3px solid transparent;}
        .char-option.selected-1p { border-color: var(--clay-p1); background: #ffe4e6;}
        .char-option.selected-2p { border-color: var(--clay-p2); background: #dbeafe;}

        .start-btn { margin-top: 20px; padding: 20px; font-size: 1.8rem; background: #10b981; letter-spacing: 2px;}

        /* =========================================
           4. 다이내믹 게임 보드
           ========================================= */
        #game-screen {
            display: none; width: 100%; max-width: 1000px; flex-direction: column; align-items: center; flex: 1; position: relative;
        }

        #turn-indicator {
            font-size: 1.5rem; padding: 10px 30px; border-radius: 25px; background: white; margin-bottom: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1); transition: all 0.3s; z-index: 10;
        }

        .board-container { position: relative; width: 100%; flex: 1; margin-bottom: 20px; }
        
        /* 뱀처럼 굽이치는 길 SVG */
        #bridges { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        .island {
            position: absolute; width: 65px; height: 65px; border-radius: 50%; background: var(--clay-island);
            box-shadow: 5px 5px 12px rgba(234, 179, 8, 0.4), -5px -5px 12px rgba(255, 255, 255, 0.9), inset 3px 3px 8px var(--clay-island-light), inset -3px -3px 8px var(--clay-island-dark);
            z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #854d0e; font-weight: bold; transform: translate(-50%, -50%);
            transition: transform 0.3s;
        }
        .island.start { background: #6ee7b7; color: #065f46; width: 80px; height: 80px; font-size: 1.8rem;}
        .island.finish { background: #fca5a5; color: #991b1b; width: 80px; height: 80px; font-size: 1.8rem;}
        
        /* 통통 튀는 플레이어 말 (캐릭터 포함) */
        .player-token {
            position: absolute; width: 50px; height: 50px; border-radius: 50%; z-index: 10;
            transform: translate(-50%, -60%); transition: left 0.4s ease-in-out, top 0.4s ease-in-out, transform 0.3s; pointer-events: none;
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
        }
        #player1 { background: var(--clay-p1); box-shadow: 4px 4px 8px rgba(190, 18, 60, 0.5), inset 3px 3px 8px rgba(255,255,255,0.5), inset -3px -3px 8px rgba(0,0,0,0.2); }
        #player2 { background: var(--clay-p2); box-shadow: 4px 4px 8px rgba(29, 78, 216, 0.5), inset 3px 3px 8px rgba(255,255,255,0.5), inset -3px -3px 8px rgba(0,0,0,0.2); display: none; }
        
        .jump-anim { animation: jumpArc 0.4s ease-in-out; }
        @keyframes jumpArc { 
            0% { margin-top: 0; transform: translate(-50%, -60%) scale(1); } 
            50% { margin-top: -40px; transform: translate(-50%, -60%) scale(1.1); } 
            100% { margin-top: 0; transform: translate(-50%, -60%) scale(1); } 
        }

        .controls { width: 100%; display: flex; justify-content: center; padding: 10px; box-sizing: border-box; z-index: 10; }
        .dice-btn { padding: 15px 40px; font-size: 1.8rem; background: #a855f7; width: 80%; max-width: 350px;}

        /* 플로팅 버튼들 */
        .float-btn {
            position: fixed; width: 60px; height: 60px; border-radius: 50%; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; z-index: 500; box-shadow: 3px 3px 8px rgba(0,0,0,0.15);
        }
        #home-btn { bottom: 20px; left: 20px; background: #cbd5e1; }
        #sound-btn { bottom: 20px; right: 20px; background: #fcd34d; }

        /* =========================================
           5. 압도적 액션의 3D 주사위
           ========================================= */
        #dice-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(3px);
            display: none; justify-content: center; align-items: center; z-index: 1500;
        }
        #dice-container {
            width: 120px; height: 120px; perspective: 800px;
        }
        .dice-3d {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transform: translateZ(-60px); 
        }
        .dice-face {
            position: absolute; width: 120px; height: 120px; background: white; border: 4px solid #f1f5f9;
            border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 4rem; font-weight: bold; color: #334155;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 0 15px rgba(0,0,0,0.2);
        }
        /* 주사위 면 배치 */
        .front  { transform: rotateY(  0deg) translateZ(60px); }
        .back   { transform: rotateY(180deg) translateZ(60px); }
        .right  { transform: rotateY( 90deg) translateZ(60px); }
        .left   { transform: rotateY(-90deg) translateZ(60px); }
        .top    { transform: rotateX( 90deg) translateZ(60px); }
        .bottom { transform: rotateX(-90deg) translateZ(60px); }
        
        .rolling-fast { animation: rollFast 0.5s linear infinite; }
        @keyframes rollFast {
            0% { transform: translateZ(-60px) rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: translateZ(-60px) rotateX(360deg) rotateY(720deg) rotateZ(180deg); }
        }

        /* =========================================
           6. 확산적 사고 대응 모달창
           ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        
        .clay-modal-box {
            background: var(--clay-modal); width: 90%; max-width: 500px; border-radius: 40px; padding: 35px;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.2), inset 3px 3px 15px rgba(255,255,255,1);
            text-align: center; display: flex; flex-direction: column; align-items: center;
        }

        #timer-bar-container { width: 100%; height: 15px; background: #e2e8f0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; display: none; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);}
        #timer-bar { width: 100%; height: 100%; background: #f43f5e; transition: width 1s linear; }

        #question-text { font-size: 2.2rem; margin-bottom: 25px; color: #0f172a; word-break: keep-all; line-height: 1.4; }
        
        .input-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        #answer-input {
            width: 100%; height: 60px; border-radius: 20px; background: #f8fafc;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.1), inset -4px -4px 8px #fff;
            font-size: 1.8rem; text-align: center; color: #334155; border: 2px solid transparent; 
            outline: none; font-family: 'Jua'; box-sizing: border-box; transition: border 0.2s;
        }
        #answer-input:focus { border: 2px solid #38bdf8; background: #ffffff; }

        .numpad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 300px; margin-bottom: 20px;
        }
        .num-btn {
            padding: 12px 0; font-size: 1.5rem; background: #e2e8f0; color: #334155; border-radius: 15px;
            box-shadow: 4px 4px 8px rgba(148, 163, 184, 0.3), -4px -4px 8px #ffffff, inset 2px 2px 5px rgba(255,255,255,0.8);
        }
        .num-btn.delete { background: #fca5a5; color: white;}
        .num-btn.clear { background: #cbd5e1; }

        .submit-btn { width: 180px; padding: 15px; font-size: 1.5rem; background: #3b82f6; letter-spacing: 1px; }
        
        /* 확산적 사고용 스페셜 버튼 */
        #open-ended-btn {
            display: none; width: 100%; padding: 20px; font-size: 1.8rem; background: #8b5cf6; margin-top: 10px;
        }

        /* =========================================
           7. 세련된 교사 대시보드
           ========================================= */
        #admin-modal .clay-modal-box { width: 95%; max-width: 700px; max-height: 85vh; padding: 40px; }
        .admin-header { margin-bottom: 20px; text-align: center; width: 100%; }
        .admin-header h2 { margin: 0 0 10px 0; color: #0369a1; font-size: 2rem; }
        .admin-header p { margin: 0; font-size: 1.1rem; color: #64748b; background:#f1f5f9; padding:10px; border-radius: 15px;}

        .q-list { 
            flex: 1; overflow-y: auto; width: 100%; text-align: left; margin-bottom: 20px; 
            padding-right: 10px; display: flex; flex-direction: column; gap: 15px;
        }
        .q-item { 
            background: #ffffff; padding: 15px; border-radius: 20px; border: 2px solid #e2e8f0;
            display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: all 0.2s;
        }
        .q-item:focus-within { border-color: #38bdf8; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.15); }
        .q-item-inputs { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .q-item input { 
            width: 100%; padding: 12px 15px; font-family: 'Jua'; font-size: 1.2rem;
            background: #f8fafc; border: none; border-radius: 12px; outline: none; box-sizing: border-box; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.05);
        }
        .q-item input:focus { background: #fff; }
        
        .delete-btn {
            background: #ef4444; width: 50px; height: 50px; border-radius: 15px; font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center; padding: 0;
        }

        .admin-controls { display: flex; gap: 15px; width: 100%; justify-content: center; }
        .admin-controls .clay-box { flex: 1; max-width: 200px; padding: 15px 0; font-size: 1.3rem; }
        .btn-add { background: #8b5cf6; }
        .btn-save { background: #10b981; }
        .btn-close { background: #64748b; }

        /* 피드백 애니메이션 */
        #feedback-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; z-index: 2000; font-size: 8rem; font-weight: bold; pointer-events: none; text-align: center;
        }
        .correct-text { color: #10b981; text-shadow: 0 0 40px white, 2px 2px 10px rgba(0,0,0,0.2); }
        .wrong-text { color: #ef4444; text-shadow: 0 0 40px white, 2px 2px 10px rgba(0,0,0,0.2); }
        @keyframes popIn { 0% { transform: scale(0.3) rotate(-10deg); opacity: 0; } 60% { transform: scale(1.2) rotate(5deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .animate-pop { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    </style>
</head>
<body class="no-scrollbar">

<div id="app">
    <div id="admin-btn" class="clay-btn-action" onclick="openAdmin()">⚙️</div>

    <div id="setup-screen" class="no-scrollbar">
        <h1>✨ 말랑말랑 보드게임</h1>
        
        <div class="setting-row">
            <div class="setting-group">
                <label>플레이어 모드:</label>
                <select id="sel-players" onchange="updateCharSelectUI()">
                    <option value="1">1인용 (혼자 모험)</option>
                    <option value="2" selected>2인용 (친구와 대결)</option>
                </select>
            </div>
            <div class="setting-group">
                <label>말판 개수:</label>
                <select id="sel-board-size">
                    <option value="10">10칸 (빠르게)</option>
                    <option value="15" selected>15칸 (보통)</option>
                    <option value="20">20칸 (길게)</option>
                </select>
            </div>
        </div>

        <div class="setting-group" style="margin-top: 5px;">
            <label>1P 캐릭터 선택:</label>
            <div class="char-select-container" id="p1-chars">
                <div class="char-option selected-1p" onclick="selectChar(1, '🐰')">🐰</div>
                <div class="char-option" onclick="selectChar(1, '🐶')">🐶</div>
                <div class="char-option" onclick="selectChar(1, '🦊')">🦊</div>
                <div class="char-option" onclick="selectChar(1, '🐼')">🐼</div>
            </div>
        </div>
        <div class="setting-group" id="p2-char-group" style="margin-top: 5px;">
            <label>2P 캐릭터 선택:</label>
            <div class="char-select-container" id="p2-chars">
                <div class="char-option" onclick="selectChar(2, '🐢')">🐢</div>
                <div class="char-option selected-2p" onclick="selectChar(2, '🐱')">🐱</div>
                <div class="char-option" onclick="selectChar(2, '🐻')">🐻</div>
                <div class="char-option" onclick="selectChar(2, '🐸')">🐸</div>
            </div>
        </div>

        <div class="setting-group" style="margin-top: 5px;">
            <label>문제 풀이 시간:</label>
            <select id="sel-timer">
                <option value="0">무제한 (여유롭게)</option>
                <option value="15">15초 (스피드)</option>
                <option value="30" selected>30초 (기본)</option>
            </select>
        </div>

        <button class="clay-box clay-btn-action start-btn" onclick="startGame()">🚀 모험 시작하기!</button>
    </div>

    <div id="game-screen">
        <div id="turn-indicator">🔴 1P 차례입니다!</div>
        <div class="board-container" id="board-container">
            <svg id="bridges"></svg>
            <div id="islands-wrapper"></div>
            <div id="player1" class="player-token">🐰</div>
            <div id="player2" class="player-token">🐱</div>
        </div>

        <div class="controls">
            <button class="clay-box clay-btn-action dice-btn" id="btn-roll" onclick="rollDiceAction()">🎲 주사위 굴리기</button>
        </div>
    </div>

    <div id="home-btn" class="clay-box clay-btn-action float-btn" onclick="goHome()">🏠</div>
    <div id="sound-btn" class="clay-box clay-btn-action float-btn" onclick="toggleSound()">🔊</div>
</div>

<div id="dice-overlay">
    <div id="dice-container">
        <div class="dice-3d" id="dice">
            <div class="dice-face front">1</div>
            <div class="dice-face back">6</div>
            <div class="dice-face right">3</div>
            <div class="dice-face left">4</div>
            <div class="dice-face top">2</div>
            <div class="dice-face bottom">5</div>
        </div>
    </div>
</div>

<div id="question-modal" class="modal-overlay">
    <div class="clay-modal-box">
        <div id="timer-bar-container"><div id="timer-bar"></div></div>
        
        <div id="question-text">문제</div>
        
        <div id="normal-input-area" style="width:100%;">
            <div class="input-wrapper">
                <input type="text" id="answer-input" placeholder="정답을 입력하세요" autocomplete="off">
            </div>
            <div class="numpad" id="custom-numpad">
                <button class="clay-box clay-btn-action num-btn" onclick="inputNumpad('1')">1</button>
                <button class="clay-box clay-btn-action num-btn" onclick="inputNumpad('2')">2</button>
                <button class="clay-box clay-btn-action num-btn" onclick="inputNumpad('3')">3</button>
                <button class="clay-box clay-btn-action num-btn" onclick="inputNumpad('4')">4</button>
                <button class="clay-box clay-btn-action num-btn" onclick="inputNumpad('5')">5</button>
                <button class="clay-box clay-btn-action num-btn" onclick="inputNumpad('6')">6</button>
                <button class="clay-box clay-btn-action num-btn" onclick="inputNumpad('7')">7</button>
                <button class="clay-box clay-btn-action num-btn" onclick="inputNumpad('8')">8</button>
                <button class="clay-box clay-btn-action num-btn" onclick="inputNumpad('9')">9</button>
                <button class="clay-box clay-btn-action num-btn clear" onclick="clearNumpad()">C</button>
                <button class="clay-box clay-btn-action num-btn" onclick="inputNumpad('0')">0</button>
                <button class="clay-box clay-btn-action num-btn delete" onclick="deleteNumpad()">⌫</button>
            </div>
            <button class="clay-box clay-btn-action submit-btn" onclick="checkAnswer()">확인</button>
        </div>

        <button id="open-ended-btn" class="clay-box clay-btn-action" onclick="passOpenEnded()">🗣️ 발표 완료 (넘어가기)</button>
    </div>
</div>

<div id="admin-modal" class="modal-overlay">
    <div class="clay-modal-box">
        <div class="admin-header">
            <h2>⚙️ 문제 출제 대시보드</h2>
            <p>💡 <b>팁:</b> 정답 칸을 비워두면 학생이 자유롭게 말하고 넘어가는 <b>'확산적 사고(오픈엔디드)'</b> 문제가 됩니다.</p>
        </div>
        
        <div class="q-list no-scrollbar" id="admin-q-list"></div>

        <div class="admin-controls">
            <button class="clay-box clay-btn-action btn-add" onclick="addQuestionField()">+ 문제 추가</button>
            <button class="clay-box clay-btn-action btn-save" onclick="saveAdmin()">저장</button>
            <button class="clay-box clay-btn-action btn-close" onclick="closeAdmin()">닫기</button>
        </div>
    </div>
</div>

<div id="feedback-overlay"><div id="feedback-text"></div></div>

<script>
    /* =========================================
       1. 자체 사운드 엔진 (Web Audio API)
       ========================================= */
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    let soundEnabled = true;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        document.getElementById('sound-btn').innerText = soundEnabled ? '🔊' : '🔇';
    }

    function playTone(freq, type, duration, vol=0.1) {
        if (!soundEnabled || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function playRollSound() { // 굴러가는 소리
        if (!soundEnabled || !audioCtx) return;
        let count = 0;
        let interval = setInterval(() => {
            playTone(200 + Math.random()*200, 'square', 0.05, 0.05);
            count++; if(count > 15) clearInterval(interval);
        }, 80);
    }

    function playJumpSound() { // 뿅! 점프 소리
        if (!soundEnabled || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
        osc.stop(audioCtx.currentTime + 0.2);
    }

    function playCorrectSound() { // 띠링! 정답
        if(!soundEnabled) return;
        playTone(523.25, 'sine', 0.15, 0.2); // C5
        setTimeout(() => playTone(659.25, 'sine', 0.2, 0.2), 100); // E5
        setTimeout(() => playTone(783.99, 'sine', 0.4, 0.2), 200); // G5
    }

    function playWrongSound() { // 떙! 오답
        if(!soundEnabled) return;
        playTone(300, 'sawtooth', 0.2, 0.1);
        setTimeout(() => playTone(250, 'sawtooth', 0.4, 0.1), 150);
    }

    /* =========================================
       2. 상태 변수 및 초기화
       ========================================= */
    let isPlaying = false;
    let totalSpaces = 15;
    let playerCount = 2;
    let timerLimit = 30;
    
    let p1Char = '🐰';
    let p2Char = '🐱';

    let players = [
        { el: document.getElementById('player1'), pos: 0, prevPos: 0, color: 'var(--clay-p1)', name: '1P' },
        { el: document.getElementById('player2'), pos: 0, prevPos: 0, color: 'var(--clay-p2)', name: '2P' }
    ];
    let currentPlayerIdx = 0;
    
    let islandPositions = [];
    let customQuestions = []; 
    let currentQ = null;
    
    let isMoving = false;
    let timerInterval = null;

    // DOMs
    const setupScreen = document.getElementById('setup-screen');
    const gameScreen = document.getElementById('game-screen');
    const boardContainer = document.getElementById('board-container');
    const turnIndicator = document.getElementById('turn-indicator');
    const btnRoll = document.getElementById('btn-roll');
    
    const questionModal = document.getElementById('question-modal');
    const answerInput = document.getElementById('answer-input');
    const timerBar = document.getElementById('timer-bar');

    /* 캐릭터 선택 로직 */
    function updateCharSelectUI() {
        const mode = document.getElementById('sel-players').value;
        document.getElementById('p2-char-group').style.display = mode === '1' ? 'none' : 'block';
    }
    
    function selectChar(playerNum, char) {
        let container = document.getElementById(playerNum === 1 ? 'p1-chars' : 'p2-chars');
        let opts = container.getElementsByClassName('char-option');
        for(let opt of opts) {
            opt.classList.remove(`selected-${playerNum}p`);
            if(opt.innerText === char) opt.classList.add(`selected-${playerNum}p`);
        }
        if(playerNum === 1) p1Char = char;
        else p2Char = char;
    }

    function startGame() {
        initAudio(); // 브라우저 오디오 권한 획득
        playerCount = parseInt(document.getElementById('sel-players').value);
        totalSpaces = parseInt(document.getElementById('sel-board-size').value);
        timerLimit = parseInt(document.getElementById('sel-timer').value);
        
        players[0].el.innerText = p1Char;
        players[1].el.innerText = p2Char;

        setupScreen.style.display = 'none';
        gameScreen.style.display = 'flex';
        isPlaying = true;

        players[0].pos = 0; players[0].prevPos = 0; players[0].el.style.display = 'flex';
        players[1].pos = 0; players[1].prevPos = 0; players[1].el.style.display = playerCount === 2 ? 'flex' : 'none';
        
        currentPlayerIdx = 0;
        updateTurnUI();
        generateBoard();
    }

    function goHome() {
        isPlaying = false;
        setupScreen.style.display = 'flex';
        gameScreen.style.display = 'none';
        questionModal.style.display = 'none';
        document.getElementById('admin-modal').style.display = 'none';
        clearInterval(timerInterval);
    }

    /* =========================================
       3. 뱀처럼 굽이치는 동적 보드 생성
       ========================================= */
    function generateBoard() {
        const islandsWrapper = document.getElementById('islands-wrapper');
        const bridgesSvg = document.getElementById('bridges');
        islandsWrapper.innerHTML = '';
        bridgesSvg.innerHTML = '';
        islandPositions = [];

        const width = boardContainer.clientWidth;
        // 칸 수에 비례하여 맵의 세로 길이를 충분히 줍니다.
        const height = Math.max(500, totalSpaces * 45); 
        
        // 한 줄에 3~4개 정도 들어가도록 계산
        const cols = width > 600 ? 5 : 4; 
        const rows = Math.ceil(totalSpaces / cols);
        
        const xStep = width / cols;
        const yStep = height / rows;
        boardContainer.style.height = `${yStep * rows + 80}px`;

        let svgPath = '';
        let dPath = ''; // SVG 베지에 곡선용

        for (let i = 0; i < totalSpaces; i++) {
            const row = Math.floor(i / cols);
            const isEvenRow = (row % 2 === 0);
            let colIndex = isEvenRow ? (i % cols) : ((cols - 1) - (i % cols));

            // 각 섬의 위치에 자연스러운 지그재그(랜덤) 오프셋을 약간 줍니다.
            let offsetX = (Math.random() - 0.5) * (xStep * 0.3);
            let offsetY = (Math.random() - 0.5) * (yStep * 0.3);
            
            // 시작과 끝은 오프셋을 주지 않음
            if(i === 0 || i === totalSpaces-1) { offsetX = 0; offsetY = 0; }

            const x = (colIndex * xStep) + (xStep / 2) + offsetX;
            const y = (row * yStep) + (yStep / 2) + offsetY;
            islandPositions.push({ x, y });

            const island = document.createElement('div');
            island.className = 'island';
            island.style.left = `${x}px`; island.style.top = `${y}px`;
            
            if (i === 0) { island.classList.add('start'); island.innerText = '출발'; }
            else if (i === totalSpaces - 1) { island.classList.add('finish'); island.innerText = '도착'; }
            else { island.innerText = i; }

            islandsWrapper.appendChild(island);

            // 곡선 길(Path) 그리기 데이터 생성
            if (i === 0) {
                dPath += `M ${x} ${y} `;
            } else {
                const pX = islandPositions[i - 1].x; 
                const pY = islandPositions[i - 1].y;
                // 베지에 제어점을 이용해 둥글게 굽이치게 만듦
                const cx = (pX + x) / 2;
                const cy = (pY + y) / 2 + (isEvenRow ? 30 : -30); // 굴곡 추가
                dPath += `Q ${cx} ${cy}, ${x} ${y} `;
            }
        }
        
        // 이중 선으로 입체적인 길 표현
        svgPath += `<path d="${dPath}" fill="none" stroke="#b45309" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>`;
        svgPath += `<path d="${dPath}" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>`;
        bridgesSvg.innerHTML = svgPath;
        
        updatePlayerPosition(0, false);
        if(playerCount === 2) updatePlayerPosition(1, false);
    }

    function updatePlayerPosition(pIdx, animate = true) {
        let p = players[pIdx];
        if (p.pos >= totalSpaces) p.pos = totalSpaces - 1;
        const pos = islandPositions[p.pos];
        
        if (animate) {
            p.el.style.transition = 'left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), top 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.3s';
            p.el.classList.add('jump-anim');
            playJumpSound(); // 뿅 소리
            setTimeout(() => p.el.classList.remove('jump-anim'), 400);
        } else {
            p.el.style.transition = 'none';
        }

        let offsetX = -50; let offsetY = -60; 
        if (playerCount === 2 && players[0].pos === players[1].pos) {
            if (pIdx === 0) { offsetX = -80; offsetY = -70; } 
            if (pIdx === 1) { offsetX = -20; offsetY = -40; } 
        } else if(playerCount === 2 && players[0].pos !== players[1].pos){
             let otherIdx = pIdx === 0 ? 1 : 0;
             players[otherIdx].el.style.transform = `translate(-50%, -60%) scale(1)`;
        }

        p.el.style.left = `${pos.x}px`;
        p.el.style.top = `${pos.y}px`;
        p.el.style.transform = `translate(${offsetX}%, ${offsetY}%) scale(1)`;
    }

    function updateTurnUI() {
        if(playerCount === 1) { turnIndicator.style.display = 'none'; return; }
        turnIndicator.style.display = 'block';
        if (currentPlayerIdx === 0) {
            turnIndicator.innerHTML = `🔴 1P (${p1Char}) 차례입니다!`;
            turnIndicator.style.color = '#be123c';
        } else {
            turnIndicator.innerHTML = `🔵 2P (${p2Char}) 차례입니다!`;
            turnIndicator.style.color = '#1d4ed8';
        }
    }

    /* =========================================
       4. 실감나는 3D 주사위 애니메이션
       ========================================= */
    function rollDiceAction() {
        if (isMoving) return;
        isMoving = true;
        btnRoll.disabled = true;

        initAudio(); // 권한 보장

        const overlay = document.getElementById('dice-overlay');
        const diceEl = document.getElementById('dice');
        overlay.style.display = 'flex';
        
        // 팽그르르 도는 클래스 추가 & 효과음 재생
        diceEl.className = 'dice-3d rolling-fast';
        playRollSound();

        const result = Math.floor(Math.random() * 6) + 1;
        
        const rotations = {
            1: { x: 0, y: 0 }, 2: { x: -90, y: 0 }, 3: { x: 0, y: -90 },
            4: { x: 0, y: 90 }, 5: { x: 90, y: 0 }, 6: { x: 180, y: 0 }
        };

        // 1.5초 후 멈춤
        setTimeout(() => {
            diceEl.className = 'dice-3d'; // 회전 애니메이션 제거
            // 결과면에 맞게 하드 코딩된 회전값 + 추가 바퀴(720deg)를 더해 착지감을 줌
            const finalX = rotations[result].x + 720;
            const finalY = rotations[result].y + 720;
            
            diceEl.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            diceEl.style.transform = `translateZ(-60px) rotateX(${finalX}deg) rotateY(${finalY}deg)`;
            
            // 멈춘 후 1초 뒤에 이동 시작
            setTimeout(() => {
                overlay.style.display = 'none';
                diceEl.style.transition = 'none'; // 리셋
                movePlayerStepByStep(result);
            }, 1000);
        }, 1500);
    }

    function movePlayerStepByStep(steps) {
        let p = players[currentPlayerIdx];
        p.prevPos = p.pos;
        let targetPos = p.pos + steps;
        if (targetPos >= totalSpaces - 1) targetPos = totalSpaces - 1;

        const moveInterval = setInterval(() => {
            if (p.pos < targetPos) {
                p.pos++;
                updatePlayerPosition(currentPlayerIdx, true);
            } else {
                clearInterval(moveInterval);
                setTimeout(() => {
                    if (p.pos === totalSpaces - 1) {
                        playCorrectSound();
                        showFeedback(`🎉 ${p.name} 승리!`, true);
                        setTimeout(() => goHome(), 3500);
                    } else {
                        askQuestion();
                    }
                }, 500);
            }
        }, 450); // 점프 애니메이션 시간에 맞춤
    }

    /* =========================================
       5. 문제 출제 및 확산적 사고 처리
       ========================================= */
    function askQuestion() {
        answerInput.value = '';
        
        let qData = customQuestions.length > 0 ? customQuestions[Math.floor(Math.random() * customQuestions.length)] : null;
        
        if (qData) {
            currentQ = qData;
            document.getElementById('question-text').innerText = qData.q;
        } else {
            // 기본 문제
            const num1 = Math.floor(Math.random() * 20) + 1;
            const num2 = Math.floor(Math.random() * 20) + 1;
            currentQ = { q: `${num1} + ${num2} = ?`, a: (num1 + num2).toString() };
            document.getElementById('question-text').innerText = currentQ.q;
        }

        // 확산적 사고 (정답이 빈칸인 경우) 처리
        const isMenuOpenEnded = (currentQ.a === "");
        const normalArea = document.getElementById('normal-input-area');
        const openBtn = document.getElementById('open-ended-btn');

        if(isMenuOpenEnded) {
            normalArea.style.display = 'none';
            openBtn.style.display = 'block';
        } else {
            normalArea.style.display = 'block';
            openBtn.style.display = 'none';
        }

        questionModal.style.display = 'flex';

        // 타이머 시작 (확산적 사고에도 타이머는 적용됨)
        if (timerLimit > 0) {
            document.getElementById('timer-bar-container').style.display = 'block';
            timerBar.style.width = '100%';
            timerBar.style.transition = 'none';
            
            setTimeout(() => {
                timerBar.style.transition = `width ${timerLimit}s linear`;
                timerBar.style.width = '0%';
            }, 50);

            let timeLeft = timerLimit;
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleWrongAnswer("시간 초과! ⏰");
                }
            }, 1000);
        } else {
            document.getElementById('timer-bar-container').style.display = 'none';
        }
    }

    // 화면 내장 숫자 키패드 동작
    function inputNumpad(num) { answerInput.value += num; }
    function deleteNumpad() { answerInput.value = answerInput.value.slice(0, -1); }
    function clearNumpad() { answerInput.value = ''; }

    answerInput.addEventListener("keyup", function(event) {
        if (event.key === "Enter") checkAnswer();
    });

    function checkAnswer() {
        clearInterval(timerInterval);
        const userAnswer = answerInput.value.trim().toLowerCase();
        
        if (userAnswer === "") { alert("정답을 입력해주세요!"); return; }

        questionModal.style.display = 'none';

        if (userAnswer === currentQ.a.toLowerCase()) {
            playCorrectSound();
            showFeedback('⭕ 정답!', true);
            nextTurn();
        } else {
            playWrongSound();
            handleWrongAnswer('❌ 오답!');
        }
    }

    // 확산적 사고 통과 버튼 처리
    function passOpenEnded() {
        clearInterval(timerInterval);
        questionModal.style.display = 'none';
        playCorrectSound();
        showFeedback('✨ 참 잘했어요!', true);
        nextTurn();
    }

    function handleWrongAnswer(msg) {
        questionModal.style.display = 'none';
        showFeedback(msg, false);
        let p = players[currentPlayerIdx];
        
        setTimeout(() => {
            p.pos = p.prevPos; 
            updatePlayerPosition(currentPlayerIdx, true); // 뒤로 돌아가기
            nextTurn();
        }, 1500);
    }

    function nextTurn() {
        setTimeout(() => {
            if (playerCount === 2) {
                currentPlayerIdx = currentPlayerIdx === 0 ? 1 : 0;
                updateTurnUI();
            }
            isMoving = false;
            btnRoll.disabled = false;
        }, 1500);
    }

    function showFeedback(text, isCorrect) {
        const fbText = document.getElementById('feedback-text');
        const fbOverlay = document.getElementById('feedback-overlay');
        fbText.innerText = text;
        fbText.className = isCorrect ? 'correct-text animate-pop' : 'wrong-text animate-pop';
        fbOverlay.style.display = 'flex';
        setTimeout(() => {
            fbOverlay.style.display = 'none';
            fbText.className = '';
        }, 1500);
    }

    /* =========================================
       6. 교사 대시보드 (디자인/로직 개선)
       ========================================= */
    function openAdmin() {
        document.getElementById('admin-modal').style.display = 'flex';
        renderAdminQuestions();
    }
    function closeAdmin() {
        document.getElementById('admin-modal').style.display = 'none';
    }

    function renderAdminQuestions() {
        const adminQList = document.getElementById('admin-q-list');
        adminQList.innerHTML = '';
        if (customQuestions.length === 0) addQuestionField(); 
        else customQuestions.forEach(item => addQuestionField(item.q, item.a));
    }

    function addQuestionField(q = "", a = "") {
        const adminQList = document.getElementById('admin-q-list');
        const div = document.createElement('div');
        div.className = 'q-item';
        div.innerHTML = `
            <div class="q-item-inputs">
                <input type="text" class="q-input" placeholder="❓ 문제 입력 (예: 주인공의 이름은?)" value="${q}">
                <input type="text" class="a-input" placeholder="❗ 정답 입력 (비워두면 자유 답변 모드)" value="${a}">
            </div>
            <button class="clay-box clay-btn-action delete-btn" onclick="this.parentElement.remove()">🗑️</button>
        `;
        adminQList.appendChild(div);
    }

    function saveAdmin() {
        const qInputs = document.querySelectorAll('.q-input');
        const aInputs = document.querySelectorAll('.a-input');
        
        customQuestions = [];
        for (let i = 0; i < qInputs.length; i++) {
            const qVal = qInputs[i].value.trim();
            const aVal = aInputs[i].value.trim(); // 비어있어도 허용
            if (qVal !== "") {
                customQuestions.push({ q: qVal, a: aVal });
            }
        }
        alert(`총 ${customQuestions.length}개의 문제가 저장되었습니다.`);
        closeAdmin();
    }

    window.addEventListener('resize', () => {
        if (isPlaying) generateBoard();
    });

</script>
</body>
</html>
